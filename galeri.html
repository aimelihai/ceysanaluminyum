  <!-- Lightbox -->

    <button class="lightbox-close" onclick="document.getElementById('lightbox').classList.remove('active');document.body.style.overflow=''" aria-label="Kapat">✕</button>
    <button class="lightbox-nav lightbox-prev" onclick="openLightbox((window._lbIdx-1+window._lbTotal)%window._lbTotal)" aria-label="Önceki">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <button class="lightbox-nav lightbox-next" onclick="openLightbox((window._lbIdx+1)%window._lbTotal)" aria-label="Sonraki">

    </button>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
  <script src="js/includes.js"></script>
  <script src="js/main.js"></script>
  <script>
    // Expose lightbox index for nav buttons
    const _origOpenLightbox = window.openLightbox;
    window.openLightbox = function(idx) {
      window._lbIdx = idx;
      _origOpenLightbox && _origOpenLightbox(idx);
    };

    // Gallery category filter
    (function() {
      const filterBar = document.getElementById('galleryFilterBar');
      if (!filterBar) return;

      filterBar.addEventListener('click', function(e) {
        const btn = e.target.closest('.filter-btn');
        if (!btn) return;

        // Update active button
        filterBar.querySelectorAll('.filter-btn').forEach(b => {
          b.classList.remove('active');
          b.setAttribute('aria-pressed', 'false');
        });
        btn.classList.add('active');
        btn.setAttribute('aria-pressed', 'true');

        const filter = btn.dataset.filter;
        const items  = document.querySelectorAll('#galleryGrid .gallery-item');

        items.forEach(item => {
          const cat = item.dataset.cat || '';
          const show = filter === 'all' || cat === filter;
          item.classList.toggle('hidden', !show);
        });
      });
    })();
  </script>
