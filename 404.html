<!DOCTYPE html>
<html lang="tr-TR" class="no-js">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sayfa Bulunamadı | CEYSAN Alüminyum</title>
  <meta name="robots" content="noindex, follow">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/fuse.js@7.0.0/dist/fuse.min.js"></script>
  <script src="js/data.js"></script>
  <script>document.documentElement.classList.remove('no-js');</script>
</head>
<body>
  <div id="header-mount"></div>

  <section style="min-height:70vh;display:flex;align-items:center;justify-content:center;padding:5rem 1rem">
    <div style="text-align:center;max-width:520px;margin:0 auto">

      <!-- Big 404 -->
      <div style="font-family:var(--ff-display);font-size:clamp(6rem,15vw,9rem);font-weight:900;line-height:1;color:var(--c-primary);opacity:.12;letter-spacing:-.05em;margin-bottom:-1rem;user-select:none" aria-hidden="true">404</div>

      <!-- Icon -->
      <div style="width:72px;height:72px;background:rgba(26,54,96,.08);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 1.5rem;color:var(--c-primary)">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <circle cx="11" cy="11" r="8"/>
          <line x1="21" y1="21" x2="16.65" y2="16.65"/>
          <line x1="11" y1="8" x2="11" y2="14"/>
          <line x1="11" y1="16" x2="11.01" y2="16"/>
        </svg>
      </div>

      <h1 style="font-family:var(--ff-display);font-size:clamp(1.5rem,4vw,2.25rem);font-weight:800;color:var(--c-dark);margin-bottom:.75rem;letter-spacing:-.02em">
        Sayfa Bulunamadı
      </h1>
      <p style="color:var(--c-muted);font-size:1rem;line-height:1.65;margin-bottom:2.5rem">
        Aradığınız sayfa taşınmış, silinmiş ya da hiç olmamış olabilir.<br>
        Ana sayfadan devam edebilirsiniz.
      </p>

      <div style="display:flex;gap:.75rem;justify-content:center;flex-wrap:wrap">
        <a href="index.html" class="btn btn-primary btn-lg">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
          Ana Sayfa
        </a>
        <a href="urunler.html" class="btn btn-dark btn-lg">Ürünlerimiz</a>
        <a href="iletisim.html" class="btn btn-dark btn-lg">İletişim</a>
      </div>

      <!-- Quick links -->
      <div style="margin-top:3rem;padding-top:2rem;border-top:1px solid #e8edf4">
        <p style="font-size:.8rem;color:var(--c-muted);text-transform:uppercase;letter-spacing:.1em;margin-bottom:1rem;font-weight:600">Hızlı Bağlantılar</p>
        <div style="display:flex;flex-wrap:wrap;gap:.5rem;justify-content:center">
          <a href="galeri.html" style="color:var(--c-primary);font-size:.875rem;text-decoration:none;padding:.3rem .75rem;border-radius:9999px;border:1px solid rgba(26,54,96,.15);transition:all .15s" onmouseover="this.style.background='rgba(26,54,96,.07)'" onmouseout="this.style.background='transparent'">Galeri</a>
          <a href="teklif.html" style="color:var(--c-primary);font-size:.875rem;text-decoration:none;padding:.3rem .75rem;border-radius:9999px;border:1px solid rgba(26,54,96,.15);transition:all .15s" onmouseover="this.style.background='rgba(26,54,96,.07)'" onmouseout="this.style.background='transparent'">Teklif Al</a>
          <a href="sineklik-siparis.html" style="color:var(--c-primary);font-size:.875rem;text-decoration:none;padding:.3rem .75rem;border-radius:9999px;border:1px solid rgba(26,54,96,.15);transition:all .15s" onmouseover="this.style.background='rgba(26,54,96,.07)'" onmouseout="this.style.background='transparent'">Sineklik Sipariş</a>
          <a href="kurumsal.html" style="color:var(--c-primary);font-size:.875rem;text-decoration:none;padding:.3rem .75rem;border-radius:9999px;border:1px solid rgba(26,54,96,.15);transition:all .15s" onmouseover="this.style.background='rgba(26,54,96,.07)'" onmouseout="this.style.background='transparent'">Hakkımızda</a>
        </div>
      </div>
    </div>
  </section>

  <div id="footer-mount"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
  <script src="js/includes.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
